# Pushing a version tag (e.g. v0.1.0) builds macOS binaries and attaches them to a GitHub Release
# so https://github.com/richkuz/cmdproxy/releases/latest/download/... URLs work.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  darwin-binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build macOS binaries
        run: |
          set -eux
          mkdir -p dist
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -o dist/cmdproxy-darwin-arm64 .
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -o dist/cmdproxy-darwin-amd64 .

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/cmdproxy-darwin-arm64
            dist/cmdproxy-darwin-amd64
          generate_release_notes: true
